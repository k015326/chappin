<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ちゃっぴん AI版</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>
<h1>ちゃっぴん AI</h1>

<!-- ▼ 凡例（ここが追加部分） -->
<div class="guide">
<b>入力例</b><br>
ストライク → 0（または空欄）<br>
10ピンだけ残り → 10<br>
1と3が残り → 13<br>
3・6・10残り → 3610
</div>

<hr>

<select id="player"></select>
<input id="newPlayer" placeholder="名前">
<button onclick="addPlayer()">追加</button>

<hr>

<input id="stand" type="number" placeholder="立ち位置">
<input id="target" type="number" placeholder="通過位置">
<input id="pins" type="tel" inputmode="numeric" placeholder="残りピン">

<button onclick="addShot()">投球</button>
<button onclick="resetGame()">新ゲーム</button>

<h2 id="result">3投で分析開始</h2>

<script src="app.js"></script>
</body>
</html>
